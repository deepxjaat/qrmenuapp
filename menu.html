<!DOCTYPE html>
<html>
<head>
<title>Menu</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI', sans-serif;
}

body{
background:linear-gradient(135deg,#1f1f1f,#2c3e50);
color:white;
}

/* HEADER */
header{
text-align:center;
padding:20px;
font-size:24px;
font-weight:bold;
letter-spacing:1px;
}

/* FILTERS */
#filters{
text-align:center;
margin-bottom:10px;
}

#filters button{
margin:5px;
padding:8px 16px;
border:none;
border-radius:20px;
background:#444;
color:white;
cursor:pointer;
transition:0.3s;
}

#filters button.active,
#filters button:hover{
background:#28a745;
}

/* LAYOUT */
.container{
display:flex;
}

/* MENU GRID */
#menu{
flex:3;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
padding:20px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border-radius:15px;
overflow:hidden;
transition:0.3s;
}

.card:hover{
transform:translateY(-8px) scale(1.02);
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-body{
padding:15px;
}

.card-body h3{
margin-bottom:5px;
}

.price{
color:#2ecc71;
font-weight:bold;
margin-bottom:10px;
}

/* BUTTON */
button.add{
width:100%;
padding:10px;
background:linear-gradient(45deg,#28a745,#2ecc71);
border:none;
border-radius:8px;
color:white;
cursor:pointer;
transition:0.3s;
}

button.add:hover{
transform:scale(1.05);
}

/* CART */
#cartBox{
flex:1;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border-left:1px solid rgba(255,255,255,0.1);
padding:15px;
min-width:260px;
height:100vh;
position:sticky;
top:0;
}

.cart-item{
margin-bottom:10px;
padding:8px;
background:rgba(255,255,255,0.1);
border-radius:8px;
}

.remove{
background:#e74c3c;
border:none;
color:white;
padding:5px 8px;
margin-top:5px;
cursor:pointer;
border-radius:5px;
}

/* TOTAL */
#total{
margin-top:10px;
font-size:18px;
}

/* ORDER BUTTON */
#cartBox button{
margin-top:10px;
width:100%;
padding:10px;
background:#2ecc71;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

/* BILL */
#bill{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#222;
padding:20px;
border-radius:10px;
display:none;
width:300px;
box-shadow:0 5px 20px rgba(0,0,0,0.5);
}

/* MOBILE */
@media(max-width:768px){
.container{
flex-direction:column;
}
#cartBox{
position:fixed;
bottom:0;
width:100%;
height:auto;
}
}
</style>
</head>

<body>

<header>🍽️ Digital Menu</header>

<div id="filters">
<button onclick="filterCategory('all')" class="active">All</button>
<span id="categoryButtons"></span>
</div>

<div class="container">

<div id="menu"></div>

<div id="cartBox">
<h3>🛒 Cart</h3>
<div id="cartItems"></div>
<h4 id="total">Total: ₹0</h4>
<button onclick="placeOrder()">Place Order</button>
</div>

</div>

<div id="bill">
<h3>Bill</h3>
<div id="billItems"></div>
<h4 id="billTotal"></h4>
<button onclick="closeBill()">Close</button>
</div>

<script>
let cart=[];
let allItems=[];

const params = new URLSearchParams(window.location.search);
const table = params.get("table") || 1;

fetch('/menu')
.then(r=>r.json())
.then(data=>{
allItems=data;
createCategoryButtons(data);
showItems(data);
});

function createCategoryButtons(data){
let categories=[...new Set(data.map(i=>i.category))];
let html="";
categories.forEach(c=>{
if(c){
html+=`<button onclick="filterCategory('${c}',this)">${c}</button>`;
}
});
document.getElementById("categoryButtons").innerHTML=html;
}

function filterCategory(cat,el){
document.querySelectorAll("#filters button").forEach(b=>b.classList.remove("active"));
if(el) el.classList.add("active");

if(cat==="all"){
showItems(allItems);
}else{
showItems(allItems.filter(i=>i.category===cat));
}
}

function showItems(data){
let html="";
data.forEach(i=>{
let img=i.image && i.image.startsWith("http")
? i.image
: "https://via.placeholder.com/300x200?text=Food";

html+=`
<div class="card">
<img src="${img}">
<div class="card-body">
<h3>${i.name}</h3>
<div class="price">₹${i.price}</div>
<button class="add" onclick='add(${JSON.stringify(i)})'>Add</button>
</div>
</div>`;
});
document.getElementById("menu").innerHTML=html;
}

function add(i){
cart.push(i);
updateCart();
}

function remove(index){
cart.splice(index,1);
updateCart();
}

function updateCart(){
let html="";
let total=0;

cart.forEach((item,index)=>{
total+=item.price;
html+=`
<div class="cart-item">
${item.name} ₹${item.price}
<br>
<button class="remove" onclick="remove(${index})">Remove</button>
</div>`;
});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText="Total: ₹"+total;
}

function placeOrder(){
if(cart.length==0) return alert("Cart empty");

let total=cart.reduce((s,i)=>s+i.price,0);

fetch('/order',{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
items:cart,
total_price:total,
table_number:table
})
})
.then(()=>{
showBill(cart,total);
cart=[];
updateCart();
});
}

function showBill(items,total){
let html="";
items.forEach(i=>{
html+=`${i.name} - ₹${i.price}<br>`;
});
document.getElementById("billItems").innerHTML=html;
document.getElementById("billTotal").innerText="Total: ₹"+total;
document.getElementById("bill").style.display="block";
}

function closeBill(){
document.getElementById("bill").style.display="none";
}
</script>

</body>
</html><!DOCTYPE html>
